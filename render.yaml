services:
  - type: web
    name: fraud-spam-detector-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8001
      - key: PYTHON_VERSION
        value: 3.11.0 # Suggest standardizing if needed, Render defaults to 3.7.10 if not set, which is too old for newer FastAPI
      - key: PROJECT_NAME
        value: "Fraud & Spam Call Detector API"
      - key: SECRET_KEY
        generateValue: true
      # You will need to add other required environment variables (like test emails for seeding etc) manually in the Render Dashboard if they are required to start up.
